workflows:
  android-release:
    name: Android Release (APK)
    max_build_duration: 60
    environment:
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://wlwotzxnzowbkbfcpnyi.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indsd290enhuem93YmtiZmNwbnlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjQ1OTEsImV4cCI6MjA5MTQ0MDU5MX0.nioXBAKA05_zRIyTpJmV_d4JY5mCYueOt5cKIlL-NNk
        NODE_ENV: production
      node: 20.18.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules
          npm ci

      - name: Expo Prebuild Android
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean

      - name: Patch MainActivity onUserLeaveHint
        script: python3 scripts/patch-android.py

      - name: Generate keystore
        script: |
          keytool -genkey -v -keystore release.keystore \
            -alias samerapp -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Samer, OU=App, O=Samer, L=Abidjan, S=Abidjan, C=CI" \
            -storepass samerapp123 -keypass samerapp123 -noprompt

      - name: Build APK Release
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/release.keystore \
            -Pandroid.injected.signing.store.password=samerapp123 \
            -Pandroid.injected.signing.key.alias=samerapp \
            -Pandroid.injected.signing.key.password=samerapp123 \
            -Pandroid.enableProguardInReleaseBuilds=false

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - djea9906@gmail.com
        notify:
          success: true
          failure: true
