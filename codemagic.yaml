workflows:
  android-release:
    name: Android Release (APK)
    max_build_duration: 60
    environment:
      vars:
        EXPO_PUBLIC_SUPABASE_URL: $EXPO_PUBLIC_SUPABASE_URL
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $EXPO_PUBLIC_SUPABASE_ANON_KEY
      node: 20.18.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Expo Prebuild Android
        script: npx expo prebuild --platform android --clean

      - name: Patch MainActivity onUserLeaveHint
        script: python3 scripts/patch-android.py

      - name: Generate keystore
        script: |
          keytool -genkey -v -keystore release.keystore \
            -alias samerapp -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Samer, OU=App, O=Samer, L=Abidjan, S=Abidjan, C=CI" \
            -storepass samerapp123 -keypass samerapp123 -noprompt

      - name: Build APK Release
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/release.keystore \
            -Pandroid.injected.signing.store.password=samerapp123 \
            -Pandroid.injected.signing.key.alias=samerapp \
            -Pandroid.injected.signing.key.password=samerapp123 \
            -Pandroid.enableProguardInReleaseBuilds=false

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - djea9906@gmail.com
        notify:
          success: true
          failure: true
